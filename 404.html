    <!-- Floating Particles -->

    <style>
        /* ===========================
   GOOGLE FONT
=========================== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

/* ===========================
   RESET
=========================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:#07121f;
}

/* ===========================
   BACKGROUND IMAGE
=========================== */

.error-bg{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100vh;

    background-image:url("./image\ 7.webp");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    animation:bgZoom 25s ease-in-out infinite alternate;

    z-index:-3;
}

/* ===========================
   DARK OVERLAY
=========================== */

.error-overlay{

    position:fixed;

    inset:0;

    background:
    linear-gradient(
    rgba(5,15,30,.82),
    rgba(7,22,42,.85));

    z-index:-2;
}

/* ===========================
   FLOATING PARTICLES
=========================== */

.particles{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:-1;
}

.particles span{

    position:absolute;

    display:block;

    width:10px;
    height:10px;

    border-radius:50%;

    background:rgba(0,255,255,.55);

    box-shadow:0 0 18px cyan;

    animation:float 16s linear infinite;
}

.particles span:nth-child(1){
left:8%;
width:8px;
height:8px;
animation-duration:13s;
}

.particles span:nth-child(2){
left:18%;
top:70%;
width:14px;
height:14px;
animation-duration:20s;
}

.particles span:nth-child(3){
left:30%;
top:40%;
animation-duration:17s;
}

.particles span:nth-child(4){
left:42%;
top:85%;
width:16px;
height:16px;
}

.particles span:nth-child(5){
left:56%;
animation-duration:15s;
}

.particles span:nth-child(6){
left:68%;
top:60%;
width:13px;
height:13px;
}

.particles span:nth-child(7){
left:80%;
animation-duration:19s;
}

.particles span:nth-child(8){
left:90%;
top:75%;
width:18px;
height:18px;
}

.particles span:nth-child(9){
left:72%;
top:20%;
}

.particles span:nth-child(10){
left:12%;
top:30%;
animation-duration:18s;
}

/* ===========================
   MAIN SECTION
=========================== */

.error-section{

    width:100%;
    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;
}

/* ===========================
   GLASS CARD
=========================== */

.error-card{

    width:100%;
    max-width:650px;

    padding:55px 40px;

    text-align:center;

    border-radius:25px;

    backdrop-filter:blur(15px);

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 25px 60px rgba(0,0,0,.45);

    animation:cardUp 1s ease;
}

/* ===========================
   404 NUMBER
=========================== */

.error-number{

    font-size:120px;

    font-weight:800;

    color:#00d9ff;

    text-shadow:
    0 0 20px #00d9ff,
    0 0 45px #00d9ff;

    animation:pulse 3s infinite;
}

/* ===========================
   TITLE
=========================== */

.error-title{

    color:#ffffff;

    font-size:34px;

    margin-top:8px;
}

/* ===========================
   DESCRIPTION
=========================== */

.error-text{

    margin:20px auto 35px;

    max-width:520px;

    color:#d8d8d8;

    line-height:1.8;

    font-size:16px;
}

/* ===========================
   BUTTONS
=========================== */

.error-buttons{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:18px;

    flex-wrap:wrap;
}

.error-buttons a,
.error-buttons button{

    text-decoration:none;

    border:none;

    cursor:pointer;

    font-size:15px;

    font-weight:600;

    padding:14px 28px;

    border-radius:40px;

    transition:.4s;

    display:flex;

    align-items:center;

    gap:10px;
}

/* Home Button */

.btn-home{

    background:#00d4ff;

    color:#fff;
}

/* Previous Button */

.btn-back{

    background:#ffffff;

    color:#1b1b1b;
}

/* ===========================
   TABLET
=========================== */

@media(max-width:768px){

.error-card{

padding:40px 28px;

max-width:95%;
}

.error-number{

font-size:90px;
}

.error-title{

font-size:28px;
}

.error-text{

font-size:15px;
}

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:480px){

.error-section{

padding:20px;
}

.error-card{

padding:30px 20px;

border-radius:20px;
}

.error-number{

font-size:70px;
}

.error-title{

font-size:22px;
}

.error-text{

font-size:14px;

line-height:1.7;
}

.error-buttons{

flex-direction:column;
}

.error-buttons a,
.error-buttons button{

width:100%;

justify-content:center;
}

}

/*=========================================
        BUTTON HOVER EFFECTS
=========================================*/

.btn-home:hover{

transform:translateY(-6px) scale(1.05);

background:#00b8e6;

box-shadow:
0 10px 30px rgba(0,212,255,.45),
0 0 25px rgba(0,212,255,.6);

}

.btn-back:hover{

transform:translateY(-6px) scale(1.05);

background:#f2f2f2;

box-shadow:
0 10px 30px rgba(255,255,255,.35);

}

.error-buttons a:active,
.error-buttons button:active{

transform:scale(.96);

}

/*=========================================
    ICON ANIMATION
=========================================*/

.error-buttons i{

transition:.4s;

}

.btn-home:hover i{

transform:translateX(4px);

}

.btn-back:hover i{

transform:translateX(-4px);

}

/*=========================================
    GLASS CARD HOVER
=========================================*/

.error-card{

transition:.5s;

}

.error-card:hover{

transform:translateY(-8px);

box-shadow:
0 30px 70px rgba(0,0,0,.5);

border-color:rgba(0,212,255,.35);

}

/*=========================================
    TITLE ANIMATION
=========================================*/

.error-title{

animation:fadeText 2s ease;

}

.error-text{

animation:fadeText 2.5s ease;

}

/*=========================================
    BACKGROUND ANIMATION
=========================================*/

@keyframes bgZoom{

0%{

    transform:scale(1);

}

100%{

    transform:scale(1.12);

}

}

/*=========================================
    FLOATING PARTICLES
=========================================*/

@keyframes float{

0%{

    transform:
    translateY(120vh)
    translateX(0)
    rotate(0deg);

    opacity:0;

}

15%{

    opacity:1;

}

50%{

    transform:
    translateY(40vh)
    translateX(25px)
    rotate(180deg);

}

100%{

    transform:
    translateY(-20vh)
    translateX(-25px)
    rotate(360deg);

    opacity:0;

}

}

/*=========================================
    CARD ENTRY
=========================================*/

@keyframes cardUp{

from{

    opacity:0;

    transform:
    translateY(80px)
    scale(.9);

}

to{

    opacity:1;

    transform:
    translateY(0)
    scale(1);

}

}

/*=========================================
    404 GLOW
=========================================*/

@keyframes pulse{

0%{

    text-shadow:
    0 0 15px #00d4ff,
    0 0 30px #00d4ff;

}

50%{

    text-shadow:
    0 0 35px #00ffff,
    0 0 70px #00ffff;

}

100%{

    text-shadow:
    0 0 15px #00d4ff,
    0 0 30px #00d4ff;

}

}

/*=========================================
    TEXT FADE
=========================================*/

@keyframes fadeText{

from{

    opacity:0;

    transform:translateY(20px);

}

to{

    opacity:1;

    transform:translateY(0);

}

}

/*=========================================
    FLOATING CARD
=========================================*/

@keyframes floating{

0%{

    transform:translateY(0px);

}

50%{

    transform:translateY(-10px);

}

100%{

    transform:translateY(0px);

}

}

.error-card{

animation:
cardUp 1s ease,
floating 6s ease-in-out infinite;

}

/*=========================================
    RESPONSIVE
=========================================*/

@media (max-width:992px){

.error-number{

font-size:90px;

}

.error-title{

font-size:28px;

}

}

@media (max-width:768px){

.error-number{

font-size:72px;

}

.error-title{

font-size:24px;

}

.error-text{

font-size:15px;

}

}

@media (max-width:480px){

.error-number{

font-size:60px;

}

.error-title{

font-size:20px;

}

.error-text{

font-size:14px;

}

.btn-home,
.btn-back{

width:100%;

justify-content:center;

}

}

/*=========================================
    CUSTOM SCROLLBAR
=========================================*/

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-track{

background:#08121d;

}

::-webkit-scrollbar-thumb{

background:#00d4ff;

border-radius:10px;

}

::-webkit-scrollbar-thumb:hover{

background:#00ffff;

}

/* Ripple Effect */

.btn-home,
.btn-back{

    position:relative;

    overflow:hidden;

}

.ripple{

    position:absolute;

    border-radius:50%;

    transform:scale(0);

    background:rgba(255,255,255,.45);

    animation:ripple .6s linear;

    pointer-events:none;

}

@keyframes ripple{

    to{

        transform:scale(4);

        opacity:0;

    }

}
        </style>

        <Script>
            /* ==========================================
   404 PAGE ANIMATION
========================================== */

window.addEventListener("load", () => {

const card = document.querySelector(".error-card");

card.style.opacity = "0";
card.style.transform = "translateY(50px) scale(.95)";

setTimeout(() => {

    card.style.transition = "all .9s ease";

    card.style.opacity = "1";
    card.style.transform = "translateY(0) scale(1)";

}, 200);

});

/* ==========================================
MOUSE PARALLAX EFFECT
========================================== */

const card = document.querySelector(".error-card");

document.addEventListener("mousemove", (e) => {

const x = (window.innerWidth / 2 - e.clientX) / 40;

const y = (window.innerHeight / 2 - e.clientY) / 40;

card.style.transform =
    `translate(${x}px, ${y}px)`;

});

/* ==========================================
BUTTON RIPPLE EFFECT
========================================== */

const buttons = document.querySelectorAll(".btn-home,.btn-back");

buttons.forEach(button => {

button.addEventListener("click", function (e) {

    const ripple = document.createElement("span");

    const rect = this.getBoundingClientRect();

    const size = Math.max(rect.width, rect.height);

    ripple.style.width = size + "px";
    ripple.style.height = size + "px";

    ripple.style.left =
        (e.clientX - rect.left - size / 2) + "px";

    ripple.style.top =
        (e.clientY - rect.top - size / 2) + "px";

    ripple.classList.add("ripple");

    this.appendChild(ripple);

    setTimeout(() => {

        ripple.remove();

    }, 600);

});

});

/* ==========================================
FLOATING PARTICLES
========================================== */

const particles = document.querySelectorAll(".particles span");

particles.forEach((particle, index) => {

particle.style.animationDelay = `${index * 1.5}s`;

particle.style.animationDuration =
    `${10 + Math.random() * 8}s`;

});

/* ==========================================
RANDOM GLOW EFFECT
========================================== */

setInterval(() => {

const number = document.querySelector(".error-number");

number.style.textShadow =
    "0 0 15px #00ffff,0 0 40px #00ffff";

setTimeout(() => {

    number.style.textShadow =
        "0 0 10px #00d4ff,0 0 25px #00d4ff";

}, 500);

}, 2500);

/* ==========================================
CARD TILT EFFECT
========================================== */

document.addEventListener("mousemove", (e) => {

const x =
    (e.clientX - window.innerWidth / 2) / 35;

const y =
    (window.innerHeight / 2 - e.clientY) / 35;

card.style.transform =

    `rotateY(${x}deg)
     rotateX(${y}deg)`;

});

document.addEventListener("mouseleave", () => {

card.style.transform =
    "rotateX(0deg) rotateY(0deg)";

});

/* ==========================================
BUTTON HOVER SCALE
========================================== */

buttons.forEach(btn => {

btn.addEventListener("mouseenter", () => {

    btn.style.transform = "scale(1.05)";

});

btn.addEventListener("mouseleave", () => {

    btn.style.transform = "scale(1)";

});

});

/* ==========================================
CONSOLE MESSAGE
========================================== */

console.log("%c404 Page Loaded Successfully!",
"color:#00d4ff;font-size:18px;font-weight:bold;");
            </script>

</body>

</html>
