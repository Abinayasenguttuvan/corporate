<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found</title>

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="404.css">

</head>

<body>

    <!-- Animated Background -->

    <div class="background">

        <div class="overlay"></div>

        <div class="blob blob1"></div>

        <div class="blob blob2"></div>

        <div class="blob blob3"></div>

        <div class="blob blob4"></div>

    </div>

    <!-- Floating Particles -->

    <div class="particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Main Container -->

    <section class="error-section">

        <div class="error-card">

            <!-- Rotating Ring -->

            <div class="ring"></div>

            <!-- Floating Icon -->

            <div class="rocket">

                🚀

            </div>

            <!-- 404 Number -->

            <h1 class="error-number">

                404

            </h1>

            <!-- Heading -->

            <h2>

                Oops! Page Not Found

            </h2>

            <!-- Description -->

            <p>

                Your request was processed successfully,

                but the page you're trying to visit

                doesn't exist or may have been moved.

            </p>

            <!-- Buttons -->

            <div class="button-group">

                <a href="index.html" class="home-btn">

                    <i class="fa-solid fa-house"></i>

                    Back To Home

                </a>

                <button class="back-btn" onclick="history.back()">

                    <i class="fa-solid fa-arrow-left"></i>

                    Previous Page

                </button>

            </div>

            <!-- Footer -->

            <div class="footer-text">

                Need help?

                <a href="contact.html">

                    Contact Support

                </a>

            </div>

        </div>

    </section>

    <script src="404.js"></script>

            <!-- Decorative Stars -->

            <div class="star star1"></div>

            <div class="star star2"></div>
    
            <div class="star star3"></div>
    
            <div class="star star4"></div>
    
            <div class="star star5"></div>
    
            <div class="star star6"></div>
    
            <!-- Decorative Glow -->
    
            <div class="glow glow1"></div>
    
            <div class="glow glow2"></div>
    
            <div class="glow glow3"></div>
    
        </section>
    
    </body>

    <style>
        /*==================================================
  GOOGLE FONT
==================================================*/

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

/*==================================================
  RESET
==================================================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    position:relative;

    color:#fff;

    background:#0f172a;

}


/*==================================================
  ANIMATED BACKGROUND
==================================================*/

.background{

    position:fixed;

    inset:0;

    background:url("images/error-bg.jpg") center center/cover no-repeat;

    z-index:-5;

}

.overlay{

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        135deg,
        rgba(13,17,45,.82),
        rgba(32,70,170,.72),
        rgba(122,33,199,.72)
    );

    animation:gradientMove 10s ease infinite;

}


/*==================================================
  GLASS BLOBS
==================================================*/

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(45px);

    opacity:.55;

    animation:floatBlob 12s ease-in-out infinite;

}

.blob1{

    width:320px;

    height:320px;

    background:#00E5FF;

    top:-80px;

    left:-80px;

}

.blob2{

    width:260px;

    height:260px;

    background:#FF4D9D;

    bottom:-60px;

    right:-60px;

    animation-delay:2s;

}

.blob3{

    width:220px;

    height:220px;

    background:#FFD93D;

    top:18%;

    right:18%;

    animation-delay:4s;

}

.blob4{

    width:180px;

    height:180px;

    background:#7C4DFF;

    bottom:20%;

    left:18%;

    animation-delay:6s;

}


/*==================================================
  MAIN SECTION
==================================================*/

.error-section{

    width:100%;

    padding:40px 20px;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

    z-index:5;

}


/*==================================================
  GLASS CARD
==================================================*/

.error-card{

    position:relative;

    width:100%;

    max-width:720px;

    padding:60px 50px;

    text-align:center;

    border-radius:30px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
        0 25px 60px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.18);

    overflow:hidden;

}


/*==================================================
  LIGHT SHINE
==================================================*/

.error-card::before{

    content:"";

    position:absolute;

    width:240px;

    height:240px;

    background:rgba(255,255,255,.08);

    border-radius:50%;

    top:-120px;

    right:-120px;

}

.error-card::after{

    content:"";

    position:absolute;

    width:180px;

    height:180px;

    background:rgba(255,255,255,.05);

    border-radius:50%;

    bottom:-90px;

    left:-90px;

}

/*==================================================
  ROTATING RING
==================================================*/

.ring{

position:absolute;

width:260px;

height:260px;

border-radius:50%;

border:8px solid rgba(255,255,255,.15);

border-top:8px solid #00E5FF;

border-right:8px solid #FF4D9D;

border-bottom:8px solid #FFD93D;

border-left:8px solid #7C4DFF;

top:25px;

left:50%;

transform:translateX(-50%);

animation:ringRotate 10s linear infinite;

}


/*==================================================
FLOATING ROCKET
==================================================*/

.rocket{

font-size:70px;

margin-bottom:15px;

animation:rocketFloat 3s ease-in-out infinite;

}


/*==================================================
404 NUMBER
==================================================*/

.error-number{

font-size:170px;

font-weight:800;

line-height:1;

letter-spacing:5px;

margin-bottom:10px;

background:linear-gradient(
    90deg,
    #FFD93D,
    #FF4D9D,
    #00E5FF,
    #7C4DFF,
    #FFD93D
);

background-size:400%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:

    gradientText 6s linear infinite,

    bounce404 2s ease infinite;

}


/*==================================================
TITLE
==================================================*/

.error-card h2{

font-size:38px;

font-weight:700;

margin-top:10px;

margin-bottom:18px;

color:#fff;

}


/*==================================================
DESCRIPTION
==================================================*/

.error-card p{

max-width:560px;

margin:auto;

font-size:18px;

line-height:1.9;

color:rgba(255,255,255,.92);

}


/*==================================================
BUTTONS
==================================================*/

.button-group{

margin-top:45px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.button-group a,
.button-group button{

border:none;

outline:none;

cursor:pointer;

text-decoration:none;

display:inline-flex;

align-items:center;

justify-content:center;

gap:10px;

padding:18px 34px;

border-radius:50px;

font-size:17px;

font-weight:600;

transition:.4s;

}


/*==================================================
HOME BUTTON
==================================================*/

.home-btn{

color:#fff;

background:linear-gradient(
    135deg,
    #00C6FF,
    #0072FF
);

box-shadow:0 15px 35px rgba(0,114,255,.35);

}

.home-btn:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:0 20px 40px rgba(0,114,255,.55);

}


/*==================================================
BACK BUTTON
==================================================*/

.back-btn{

color:#fff;

background:linear-gradient(
    135deg,
    #FF416C,
    #FF4B2B
);

box-shadow:0 15px 35px rgba(255,65,108,.35);

}

.back-btn:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:0 20px 40px rgba(255,65,108,.55);

}


/*==================================================
FOOTER
==================================================*/

.footer-text{

margin-top:35px;

font-size:16px;

color:rgba(255,255,255,.85);

}

.footer-text a{

color:#FFD93D;

text-decoration:none;

font-weight:600;

}

.footer-text a:hover{

color:#ffffff;

}

/*==================================================
  FLOATING PARTICLES
==================================================*/

.particles{

position:fixed;

inset:0;

pointer-events:none;

overflow:hidden;

z-index:-2;

}

.particles span{

position:absolute;

bottom:-80px;

width:8px;

height:8px;

border-radius:50%;

background:#ffffff;

opacity:.7;

animation:particleUp 18s linear infinite;

}

/* Individual Particle Positions */

.particles span:nth-child(1){

left:8%;

width:6px;

height:6px;

animation-delay:0s;

}

.particles span:nth-child(2){

left:18%;

width:12px;

height:12px;

animation-delay:2s;

}

.particles span:nth-child(3){

left:28%;

animation-delay:4s;

}

.particles span:nth-child(4){

left:40%;

width:10px;

height:10px;

animation-delay:6s;

}

.particles span:nth-child(5){

left:52%;

width:14px;

height:14px;

animation-delay:8s;

}

.particles span:nth-child(6){

left:64%;

animation-delay:10s;

}

.particles span:nth-child(7){

left:74%;

width:10px;

height:10px;

animation-delay:12s;

}

.particles span:nth-child(8){

left:84%;

animation-delay:14s;

}

.particles span:nth-child(9){

left:92%;

width:12px;

height:12px;

animation-delay:16s;

}

.particles span:nth-child(10){

left:98%;

width:8px;

height:8px;

animation-delay:18s;

}


/*==================================================
TWINKLING STARS
==================================================*/

.star{

position:absolute;

width:5px;

height:5px;

background:#fff;

border-radius:50%;

box-shadow:

    0 0 12px #fff,

    0 0 20px #00e5ff;

animation:twinkle 3s ease-in-out infinite;

}

.star1{

top:12%;

left:14%;

}

.star2{

top:24%;

right:18%;

animation-delay:1s;

}

.star3{

bottom:20%;

left:24%;

animation-delay:2s;

}

.star4{

top:62%;

right:26%;

animation-delay:3s;

}

.star5{

bottom:12%;

right:10%;

animation-delay:1.5s;

}

.star6{

top:8%;

left:72%;

animation-delay:2.5s;

}


/*==================================================
GLOW EFFECTS
==================================================*/

.glow{

position:absolute;

border-radius:50%;

filter:blur(70px);

opacity:.45;

animation:glowPulse 6s ease-in-out infinite;

}

.glow1{

width:220px;

height:220px;

background:#00E5FF;

top:8%;

left:6%;

}

.glow2{

width:280px;

height:280px;

background:#FF4D9D;

bottom:6%;

right:8%;

animation-delay:2s;

}

.glow3{

width:180px;

height:180px;

background:#FFD93D;

top:48%;

left:52%;

animation-delay:4s;

}


/*==================================================
DECORATIVE LIGHT DOTS
==================================================*/

.error-card::before{

content:"";

position:absolute;

width:240px;

height:240px;

background:radial-gradient(circle,
    rgba(255,255,255,.20),
    transparent 70%);

top:-100px;

right:-100px;

border-radius:50%;

}

.error-card::after{

content:"";

position:absolute;

width:180px;

height:180px;

background:radial-gradient(circle,
    rgba(255,255,255,.15),
    transparent 70%);

bottom:-80px;

left:-80px;

border-radius:50%;

}

/*=========================================
KEYFRAME ANIMATIONS
=========================================*/

@keyframes gradientMove{

0%{
    filter:hue-rotate(0deg);
}

50%{
    filter:hue-rotate(40deg);
}

100%{
    filter:hue-rotate(0deg);
}

}

/* Floating Blobs */

@keyframes floatBlob{

0%{

    transform:translate(0,0) scale(1);

}

25%{

    transform:translate(40px,-30px) scale(1.08);

}

50%{

    transform:translate(0,-60px) scale(.95);

}

75%{

    transform:translate(-40px,-20px) scale(1.05);

}

100%{

    transform:translate(0,0) scale(1);

}

}

/* Rotating Ring */

@keyframes ringRotate{

from{

    transform:translateX(-50%) rotate(0deg);

}

to{

    transform:translateX(-50%) rotate(360deg);

}

}

/* Rocket Float */

@keyframes rocketFloat{

0%{

    transform:translateY(0);

}

50%{

    transform:translateY(-18px);

}

100%{

    transform:translateY(0);

}

}

/* Animated 404 */

@keyframes gradientText{

0%{

    background-position:0%;

}

100%{

    background-position:400%;

}

}

@keyframes bounce404{

0%{

    transform:translateY(0);

}

50%{

    transform:translateY(-15px);

}

100%{

    transform:translateY(0);

}

}

/* Particles */

@keyframes particleUp{

0%{

    transform:translateY(0) scale(.2);

    opacity:0;

}

10%{

    opacity:.8;

}

100%{

    transform:translateY(-120vh) scale(1.5);

    opacity:0;

}

}

/* Twinkle */

@keyframes twinkle{

0%{

    opacity:.2;

    transform:scale(.6);

}

50%{

    opacity:1;

    transform:scale(1.5);

}

100%{

    opacity:.2;

    transform:scale(.6);

}

}

/* Glow */

@keyframes glowPulse{

0%{

    transform:scale(1);

    opacity:.35;

}

50%{

    transform:scale(1.25);

    opacity:.6;

}

100%{

    transform:scale(1);

    opacity:.35;

}

}

/* Card Entrance */

.error-card{

animation:cardFade .9s ease;

}

@keyframes cardFade{

from{

    opacity:0;

    transform:translateY(60px) scale(.9);

}

to{

    opacity:1;

    transform:translateY(0) scale(1);

}

}

/*=========================================
TABLET
=========================================*/

@media(max-width:992px){

.error-card{

max-width:90%;

padding:50px 35px;

}

.error-number{

font-size:130px;

}

.error-card h2{

font-size:32px;

}

.error-card p{

font-size:17px;

}

.ring{

width:220px;

height:220px;

}

}

/*=========================================
MOBILE
=========================================*/

@media(max-width:768px){

.error-card{

padding:40px 25px;

}

.error-number{

font-size:100px;

}

.error-card h2{

font-size:26px;

}

.error-card p{

font-size:15px;

line-height:1.8;

}

.button-group{

flex-direction:column;

gap:15px;

}

.button-group a,
.button-group button{

width:100%;

padding:16px;

font-size:16px;

}

.ring{

width:170px;

height:170px;

border-width:6px;

}

.rocket{

font-size:55px;

}

}

/*=========================================
SMALL MOBILE
=========================================*/

@media(max-width:480px){

.error-card{

padding:30px 20px;

}

.error-number{

font-size:80px;

}

.error-card h2{

font-size:22px;

}

.error-card p{

font-size:14px;

}

.footer-text{

font-size:14px;

}

.ring{

width:140px;

height:140px;

}

.rocket{

font-size:45px;

}

}

/*=========================================
BUTTON ACTIVE
=========================================*/

.home-btn:active,
.back-btn:active{

transform:scale(.95);

}

/*=========================================
CUSTOM SCROLLBAR
=========================================*/

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-track{

background:#111827;

}

::-webkit-scrollbar-thumb{

background:#00E5FF;

border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

background:#00B8D4;

}
    </style>
    
    </html>
